# Training configuration
model:
  name: "alphaproof"
  hidden_dim: 512
  num_layers: 6
  num_heads: 8
  dropout: 0.1

training:
  batch_size: 32
  num_epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_steps: 1000
  gradient_clip: 1.0

data:
  max_seq_length: 512
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

logging:
  log_interval: 100
  save_interval: 1000
  use_wandb: true
  project_name: "alphaproof"

checkpoint:
  save_dir: "checkpoints"
  resume_from: null

environment:
  lean_version: "v4.27.0-rc1"  # Lean 4 version
  mathlib_version: null  # Use latest mathlib, or specify version
  timeout: 30  # Timeout in seconds per tactic
  verbose: false  # Enable verbose Lean server logging
  auto_recover: true  # Auto-restart server on crashes
